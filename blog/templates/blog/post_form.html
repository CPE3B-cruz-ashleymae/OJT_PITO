{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card p-4 bg-white border-0 shadow-sm mb-4">
        <h2 class="fw-bold mb-4" style="color: #880e4f;">
            {% if 'update' in request.path %}
                <i class="fas fa-edit me-2" style="color: #d81b60;"></i> Edit Your Post
            {% else %}
                <i class="fas fa-pen-nib me-2" style="color: #d81b60;"></i> Create A New Post
            {% endif %}
        </h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <fieldset class="form-group mb-4">
                {{ form|crispy }}
            </fieldset>
            
            <div class="form-group d-flex gap-2">
                <button class="btn btn-pink px-4 py-2 fw-semibold" type="submit">
                    Save Changes
                </button>
                <a class="btn btn-light border px-4 py-2 text-secondary" href="{% if object %}{% url 'post-detail' object.id %}{% else %}{% url 'blog-home' %}{% endif %}">
                    Cancel
                </a>
            </div>
        </form>
    </div>
{% endblock content %}
