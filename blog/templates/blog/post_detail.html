{% extends "blog/base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'blog-home' %}" class="text-decoration-none text-muted">Home</a></li>
                <li class="breadcrumb-item active">Article</li>
            </ol>
        </nav>

        <article class="bg-white p-4 p-md-5 shadow-sm rounded-4">
            <header class="mb-4 text-center">
                <h1 class="display-5 fw-bold mb-3">{{ object.title }}</h1>
                <div class="text-muted small">
                    <span class="fw-bold text-primary">{{ object.author }}</span> 
                    &bull; {{ object.date_posted|date:"F d, Y" }}
                </div>
            </header>

            {% if object.image %}
                <div class="mb-5">
                    <img src="{{ object.image.url }}" class="img-fluid rounded-4 shadow-sm w-100" style="max-height: 450px; object-fit: cover;">
                </div>
            {% endif %}

            <div class="article-body fs-5 text-dark leading-relaxed" style="white-space: pre-line;">
                {{ object.content }}
            </div>

            {% if object.author == user %}
                <div class="mt-5 pt-4 border-top d-flex gap-2">
                    <a class="btn btn-sm btn-outline-secondary px-4 rounded-pill" href="{% url 'post-update' object.id %}">Edit</a>
                    <a class="btn btn-sm btn-outline-danger px-4 rounded-pill" href="{% url 'post-delete' object.id %}">Delete</a>
                </div>
            {% endif %}
        </article>
    </div>
</div>
{% endblock content %}
