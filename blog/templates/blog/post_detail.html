{% extends "blog/base.html" %}
{% block content %}
    <article class="card p-4 mb-4 bg-white border-0 shadow-sm">
        <div class="d-flex align-items-center mb-4">
            <img class="rounded-circle me-3" src="{{ object.author.profile.image.url }}" style="width: 50px; height: 50px; object-fit: cover;">
            <div>
                <a class="fw-bold text-decoration-none" href="#" style="color: #d81b60;">{{ object.author.username }}</a>
                <small class="text-muted d-block">{{ object.date_posted|date:"F d, Y" }}</small>
            </div>
        </div>
        
        <h1 class="fw-bold mb-3" style="color: #4a4a4a;">{{ object.title }}</h1>
        <div class="text-secondary lh-lg mb-4" style="white-space: pre-line;">
            {{ object.content }}
        </div>

        <div class="d-flex gap-2 border-top pt-3">
            <a href="{% url 'blog-home' %}" class="btn btn-sm btn-outline-pink px-3">
                <i class="fas fa-arrow-left me-1"></i> Back to Feed
            </a>

            {% if object.author == user %}
                <a href="{% url 'post-update' object.id %}" class="btn btn-sm btn-light border px-3" style="color: #4a4a4a;">
                    <i class="fas fa-edit me-1"></i> Edit Post
                </a>
            {% endif %}
        </div>
    </article>
{% endblock content %}
