{% extends "blog/base.html" %}
{% block content %}
    <div class="card p-4 bg-white border-0 shadow-sm mb-4">
        <h2 class="fw-bold mb-3" style="color: #880e4f;">Delete Post</h2>
        <p class="text-secondary mb-4">
            Are you absolutely sure you want to delete the post titled <strong class="text-dark">"{{ object.title }}"</strong>? This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group d-flex gap-2">
                <button class="btn btn-danger px-4 py-2 fw-semibold" type="submit">
                    Yes, Delete
                </button>
                <a class="btn btn-light border px-4 py-2 text-secondary" href="{% url 'post-detail' object.id %}">
                    Cancel
                </a>
            </div>
        </form>
    </div>
{% endblock content %}
