<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ✨ Professional Soft-Pink Minimalist UI Theme Styles */
        body {
            background-color: #fdf7f8;
            color: #3a3a3a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Navbar Customization */
        .navbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f3e1e4;
            box-shadow: 0 4px 20px rgba(216, 27, 96, 0.02);
        }
        
        .navbar-brand {
            color: #c2185b !important;
            letter-spacing: -0.5px;
        }
        
        .nav-link {
            color: #614e52 !important;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }
        
        .nav-link:hover {
            color: #c2185b !important;
        }
        
        /* Modernized Search Box */
        .search-container {
            position: relative;
        }
        
        .search-container::before {
            content: "\f002";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b59fa3;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .search-bar {
            background-color: #f7eaed;
            border: 1px solid transparent;
            border-radius: 30px;
            color: #49393b;
            padding-left: 40px;
            font-size: 0.9rem;
            height: 40px;
            transition: all 0.25s ease-in-out;
        }
        
        .search-bar:focus {
            background-color: #ffffff;
            border-color: #c2185b;
            box-shadow: 0 0 0 4px rgba(194, 24, 91, 0.1);
            color: #49393b;
            outline: none;
        }
        
        /* Sleek Button Components */
        .btn-pink {
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: #ffffff !important;
            border: none;
            border-radius: 30px;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 12px rgba(194, 24, 91, 0.15);
            transition: all 0.2s ease;
        }
        
        .btn-pink:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(194, 24, 91, 0.25);
        }
        
        .btn-outline-pink {
            background-color: #ffffff;
            color: #c2185b;
            border: 1px solid #e8b9c4;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.88rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-outline-pink:hover {
            background-color: #fdf2f4;
            border-color: #c2185b;
            color: #c2185b;
        }

        /* Card and Layout Blocks */
        .card {
            border-radius: 16px;
            border: 1px solid rgba(243, 225, 228, 0.6);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'blog-home' %}">DevBlog</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex mx-auto col-lg-5 search-container" method="GET" action="{% url 'blog-home' %}">
                    <input class="form-control search-bar w-100" type="search" name="q" placeholder="Search articles, topics..." value="{{ request.GET.q }}">
                </form>
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'blog-home' %}">Feed</a></li>
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link px-3" href="{% url 'post-create' %}">Write</a></li>
                        <li class="nav-item">
                            <form id="logout-form" method="post" action="{% url 'logout' %}" class="d-none">{% csrf_token %}</form>
                            <a class="nav-link px-3 text-muted" href="#" onclick="document.getElementById('logout-form').submit();">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link px-3" href="{% url 'login' %}">Login</a></li>
                    </ul>
                    {% endif %}
                </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
