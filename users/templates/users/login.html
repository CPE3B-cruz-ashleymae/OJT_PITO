{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% load socialaccount %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 bg-white">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: #d81b60;">Sign in</h2>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form|crispy }}
                </div>
                
                <div class="text-end mb-3">
                    <a href="#" class="small text-decoration-none" style="color: #d81b60;">Forgot password?</a>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn fw-bold py-2 text-white rounded-3" style="background-color: #d81b60; border: none;" type="submit">Sign in</button>
                </div>
            </form>

            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1 text-muted opacity-25">
                <span class="mx-3 text-muted small">or</span>
                <hr class="flex-grow-1 text-muted opacity-25">
            </div>

            <div class="d-grid gap-2">
                <a href="{% provider_login_url 'google' %}" class="btn border py-2 d-flex align-items-center justify-content-center rounded-3 bg-white btn-google-hover" style="border-color: #fce4ec !important;">
                    <svg class="me-2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.87h12.66c-.54 2.87-2.17 5.31-4.61 6.94l7.19 5.57c4.21-3.88 6.66-9.59 6.66-16.69z"/>
                        <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.19-5.57c-1.99 1.33-4.55 2.13-7.7 2.13-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    <span class="text-dark small fw-bold">Sign in with Google</span>
                </a>
            </div>

            <div class="text-center mt-4 pt-2">
                <a href="#" class="small text-decoration-none" style="color: #d81b60;">Sign in with custom SSO</a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling to handle custom hover states dynamically for elements */
    .btn-google-hover:hover {
        background-color: #fff5f7 !important;
        border-color: #f8bbd0 !important;
    }
</style>
{% endblock content %}
