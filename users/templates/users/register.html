{% extends "blog/base.html" %}
{% block content %}
    <h1>Join Today</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
{% endblock content %}
